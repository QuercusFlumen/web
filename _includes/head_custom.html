<meta property="og:site_name" content="Quercus Flumen">
<meta property="og:locale" content="es_ES">
<meta name="theme-color" content="#f5f0e6">

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@graph": [

    {
      "@type": "Organization",
      "@id": "{{ site.url }}#organization",
      "name": "Quercus Flumen",
      "url": "{{ site.url }}",
      "logo": {
        "@type": "ImageObject",
        "url": "{{ site.url }}{{ site.logo }}"
      },
      "description": "{{ site.description | strip_html | strip_newlines | escape }}"
    },

    {
      "@type": "WebSite",
      "@id": "{{ site.url }}#website",
      "url": "{{ site.url }}",
      "name": "Quercus Flumen",
      "description": "{{ site.description | strip_html | strip_newlines | escape }}",
      "publisher": {
        "@id": "{{ site.url }}#organization"
      },
      "inLanguage": "es-ES"
    },

    {
      "@type": "WebPage",
      "@id": "{{ site.url }}{{ page.url }}#webpage",
      "url": "{{ site.url }}{{ page.url }}",
      "name": "{{ page.title | default: site.title | escape }}",
      "description": "{{ page.description | default: site.description | strip_html | strip_newlines | escape }}",
      "isPartOf": {
        "@id": "{{ site.url }}#website"
      },
      "publisher": {
        "@id": "{{ site.url }}#organization"
      },
      "inLanguage": "es-ES"
    }

    {% if page.title %},

    {
      "@type": "Article",
      "@id": "{{ site.url }}{{ page.url }}#article",
      "headline": "{{ page.title | escape }}",
      "description": "{{ page.description | default: site.description | strip_html | strip_newlines | escape }}",
      "author": {
        "@id": "{{ site.url }}#organization"
      },
      "publisher": {
        "@id": "{{ site.url }}#organization"
      },
      "mainEntityOfPage": {
        "@id": "{{ site.url }}{{ page.url }}#webpage"
      },
      "url": "{{ site.url }}{{ page.url }}",
      "inLanguage": "es-ES"
    }

    {% endif %}

    {% if page.parent %},

    {
      "@type": "BreadcrumbList",
      "@id": "{{ site.url }}{{ page.url }}#breadcrumb",
      "itemListElement": [

        {
          "@type": "ListItem",
          "position": 1,
          "name": "Inicio",
          "item": "{{ site.url }}"
        }

        {% if page.grand_parent %},
        {
          "@type": "ListItem",
          "position": 2,
          "name": "{{ page.grand_parent | escape }}",
          "item": "{{ site.url }}"
        }
        {% endif %},

        {
          "@type": "ListItem",
          "position": 3,
          "name": "{{ page.parent | escape }}",
          "item": "{{ site.url }}{{ page.url }}"
        },

        {
          "@type": "ListItem",
          "position": 4,
          "name": "{{ page.title | escape }}",
          "item": "{{ site.url }}{{ page.url }}"
        }

      ]
    }

    {% endif %}

  ]
}
</script>
